  "ai agent",
  "coding agent",
  "mcp server",
  "claude code",
  "codex",
  "cursor",
  "prompt pack",
  "awesome list",
  "boilerplate",
  "starter template",
  "plugin for",
  "framework for",
  "sdk for",
]
